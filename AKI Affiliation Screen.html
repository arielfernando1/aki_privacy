<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AKÍ – Pantalla de Afiliación</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a1a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Caveat', cursive;
    padding: 32px 16px;
    gap: 48px;
    flex-wrap: wrap;
  }
  .variant-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .variant-label { color: rgba(255,255,255,0.45); font-size: 13px; font-family: monospace; letter-spacing: 0.08em; text-transform: uppercase; }
  .tweaks-panel {
    position: fixed; bottom: 24px; right: 24px;
    background: #fff; border: 2px solid #222;
    border-radius: 12px; padding: 16px; width: 220px;
    display: none; flex-direction: column; gap: 12px;
    z-index: 9999; font-family: monospace; font-size: 13px;
    box-shadow: 4px 4px 0 #222;
  }
  .tweaks-panel.open { display: flex; }
  .tweaks-panel h3 { font-size: 14px; font-weight: 700; border-bottom: 1.5px solid #ddd; padding-bottom: 8px; }
  .tweak-row { display: flex; flex-direction: column; gap: 4px; }
  .tweak-row label { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.05em; }
  .tweak-row select { width: 100%; cursor: pointer; padding: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<div class="tweaks-panel" id="tweaksPanel">
  <h3>Tweaks</h3>
  <div class="tweak-row">
    <label>Variante</label>
    <select id="twk-variant">
      <option value="all">Todas (comparar)</option>
      <option value="0">A – Bottom Sheet</option>
      <option value="1">B – Full Screen</option>
    </select>
  </div>
</div>

<script type="text/babel">
const RED = '#C8102E';
const YELLOW = '#FFD100';
const DARK_RED = '#8a0b1f';

function Squiggle({ color = RED, width = 140 }) {
  return (
    <svg height="6" width={width} style={{ display: 'block', margin: '0 auto' }}>
      <path
        d={`M0 4 Q${width*.1} 1 ${width*.2} 4 Q${width*.3} 7 ${width*.4} 4 Q${width*.5} 1 ${width*.6} 4 Q${width*.7} 7 ${width*.8} 4 Q${width*.9} 1 ${width} 4`}
        fill="none" stroke={color} strokeWidth="2" strokeLinecap="round"
      />
    </svg>
  );
}

const BENEFITS = [
  { icon: '🏷️', title: 'Descuentos exclusivos', desc: 'Ofertas solo para miembros en productos seleccionados' },
  { icon: '⭐', title: 'Acumulás puntos', desc: 'Cada compra suma puntos canjeables en tu próxima visita' },
  { icon: '📱', title: 'Tarjeta digital', desc: 'Tu tarjeta AKÍ Club siempre en el celular, sin plástico' },
];

const COMMITMENTS = [
  'Solo usaremos tu cédula para identificarte en el sistema',
  'Tu historial de compras no se vende a terceros',
  'Podés darte de baja en cualquier momento desde Mi Perfil',
];

function BenefitRow({ icon, title, desc }) {
  return (
    <div style={{ display: 'flex', gap: 12, alignItems: 'flex-start', padding: '10px 0', borderBottom: '1px dashed #eee' }}>
      <span style={{ fontSize: 22, lineHeight: 1 }}>{icon}</span>
      <div>
        <div style={{ fontFamily: 'Caveat,cursive', fontSize: 17, fontWeight: 700, color: '#111' }}>{title}</div>
        <div style={{ fontFamily: 'Caveat,cursive', fontSize: 14, color: '#777', lineHeight: 1.3 }}>{desc}</div>
      </div>
    </div>
  );
}

function CommitmentItem({ text }) {
  return (
    <div style={{ display: 'flex', gap: 8, alignItems: 'flex-start' }}>
      <svg width="16" height="16" viewBox="0 0 16 16" style={{ flexShrink: 0, marginTop: 2 }}>
        <circle cx="8" cy="8" r="7" fill="rgba(200,16,46,0.1)" stroke={RED} strokeWidth="1.2"/>
        <path d="M4.5 8L7 10.5l4.5-5" stroke={RED} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
      </svg>
      <span style={{ fontFamily: 'Caveat,cursive', fontSize: 14, color: '#555', lineHeight: 1.4 }}>{text}</span>
    </div>
  );
}

// VARIANT A: Bottom Sheet over home screen
function VariantBottomSheet() {
  const [open, setOpen] = React.useState(true);
  return (
    <div style={{ width: '100%', height: '100%', position: 'relative', overflow: 'hidden', background: '#fafafa' }}>
      {/* Fake home screen behind */}
      <div style={{ padding: '60px 16px 0' }}>
        <div style={{ height: 18, background: '#eee', borderRadius: 4, marginBottom: 12, width: '40%' }} />
        {[1,2,3].map(i => <div key={i} style={{ height: 56, background: '#fff', border: '1px solid #eee', borderRadius: 10, marginBottom: 10 }} />)}
      </div>

      {open && <div onClick={() => setOpen(false)} style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.4)', zIndex: 10 }} />}

      <div style={{
        position: 'absolute', left: 0, right: 0, bottom: 0,
        background: '#fff', borderRadius: '22px 22px 0 0',
        zIndex: 20,
        transform: open ? 'translateY(0)' : 'translateY(110%)',
        transition: 'transform 0.32s cubic-bezier(0.32,0.72,0,1)',
        padding: '0 20px 28px',
        boxShadow: '0 -4px 24px rgba(0,0,0,0.12)',
        maxHeight: '88%',
        overflow: 'hidden',
        display: 'flex', flexDirection: 'column',
      }}>
        <div style={{ width: 36, height: 4, background: '#e0e0e0', borderRadius: 2, margin: '10px auto 14px', flexShrink: 0 }} />

        <div style={{ overflowY: 'auto', flex: 1, display: 'flex', flexDirection: 'column', gap: 14 }}>
          <div>
            <div style={{ fontFamily: 'Caveat,cursive', fontSize: 22, fontWeight: 700, color: '#111' }}>Afiliarte a AKÍ Club</div>
            <Squiggle width={160} color={YELLOW} />
            <p style={{ fontFamily: 'Caveat,cursive', fontSize: 15, color: '#666', marginTop: 6, lineHeight: 1.4 }}>
              Esto es lo que obtenés y lo que nos comprometemos con vos:
            </p>
          </div>

          <div>{BENEFITS.map((b, i) => <BenefitRow key={i} {...b} />)}</div>

          <div style={{ background: '#f9f9f9', borderRadius: 10, padding: '12px 14px', display: 'flex', flexDirection: 'column', gap: 8 }}>
            <div style={{ fontFamily: 'Caveat,cursive', fontSize: 15, fontWeight: 700, color: '#333' }}>Nuestro compromiso:</div>
            {COMMITMENTS.map((c, i) => <CommitmentItem key={i} text={c} />)}
          </div>

          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            <button style={{ width: '100%', padding: '13px 0', background: RED, color: '#fff', border: `2.5px solid ${DARK_RED}`, borderRadius: 12, fontFamily: 'Caveat,cursive', fontSize: 18, fontWeight: 700, cursor: 'pointer', boxShadow: `3px 3px 0 ${DARK_RED}` }}>
              Sí, afiliarme
            </button>
            <button onClick={() => setOpen(false)} style={{ width: '100%', padding: '12px 0', background: '#fff', color: RED, border: `2px solid ${RED}`, borderRadius: 12, fontFamily: 'Caveat,cursive', fontSize: 18, fontWeight: 700, cursor: 'pointer' }}>
              Ahora no
            </button>
          </div>
        </div>
      </div>

      {!open && (
        <button onClick={() => setOpen(true)} style={{ position: 'absolute', bottom: 24, left: 20, right: 20, background: RED, color: '#fff', border: 'none', borderRadius: 10, fontFamily: 'Caveat,cursive', fontSize: 16, fontWeight: 700, padding: '13px 0', cursor: 'pointer', zIndex: 5 }}>
          Abrir pantalla →
        </button>
      )}
    </div>
  );
}

// VARIANT B: Full Screen
function VariantFullScreen() {
  return (
    <div style={{ width: '100%', height: '100%', background: '#fff', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      {/* Header */}
      <div style={{ background: RED, padding: '56px 24px 28px', flexShrink: 0 }}>
        <div style={{ fontFamily: 'Caveat,cursive', fontSize: 26, fontWeight: 700, color: '#fff', marginBottom: 4 }}>AKÍ Club</div>
        <div style={{ fontFamily: 'Caveat,cursive', fontSize: 20, fontWeight: 700, color: '#fff', lineHeight: 1.2 }}>Afiliación transparente</div>
        <Squiggle color={YELLOW} width={160} />
      </div>

      <div style={{ flex: 1, overflowY: 'auto', padding: '16px 20px' }}>
        <p style={{ fontFamily: 'Caveat,cursive', fontSize: 15, color: '#555', marginBottom: 14, lineHeight: 1.45 }}>
          Antes de confirmar, revisá qué obtenés y cómo usamos tus datos:
        </p>

        <div style={{ marginBottom: 14 }}>{BENEFITS.map((b, i) => <BenefitRow key={i} {...b} />)}</div>

        <div style={{ background: '#fef6f7', border: `1.5px solid rgba(200,16,46,0.2)`, borderRadius: 10, padding: '12px 14px', display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 16 }}>
          <div style={{ fontFamily: 'Caveat,cursive', fontSize: 15, fontWeight: 700, color: RED }}>Nuestro compromiso:</div>
          {COMMITMENTS.map((c, i) => <CommitmentItem key={i} text={c} />)}
        </div>

        <div style={{ display: 'flex', flexDirection: 'column', gap: 10, paddingBottom: 8 }}>
          <button style={{ width: '100%', padding: '14px 0', background: RED, color: '#fff', border: `2.5px solid ${DARK_RED}`, borderRadius: 12, fontFamily: 'Caveat,cursive', fontSize: 19, fontWeight: 700, cursor: 'pointer', boxShadow: `3px 3px 0 ${DARK_RED}` }}>
            Sí, afiliarme
          </button>
          <button style={{ width: '100%', padding: '12px 0', background: '#fff', color: RED, border: `2px solid ${RED}`, borderRadius: 12, fontFamily: 'Caveat,cursive', fontSize: 19, fontWeight: 700, cursor: 'pointer' }}>
            Ahora no
          </button>
          <div style={{ textAlign: 'center', fontFamily: 'Caveat,cursive', fontSize: 13, color: '#aaa' }}>
            Podés afiliarte también desde Mi Perfil en cualquier momento
          </div>
        </div>
      </div>
    </div>
  );
}

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{ "variant": "1" }/*EDITMODE-END*/;

function App() {
  const [variant, setVariant] = React.useState(TWEAK_DEFAULTS.variant);

  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') document.getElementById('tweaksPanel').classList.add('open');
      if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaksPanel').classList.remove('open');
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  React.useEffect(() => {
    const v = document.getElementById('twk-variant');
    if (!v) return;
    const onChange = () => {
      setVariant(v.value);
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { variant: v.value } }, '*');
    };
    v.addEventListener('change', onChange);
    return () => v.removeEventListener('change', onChange);
  }, []);

  const variants = [
    { key: '0', label: 'A – Bottom Sheet', el: <VariantBottomSheet /> },
    { key: '1', label: 'B – Full Screen', el: <VariantFullScreen /> },
  ];
  const shown = variant === 'all' ? variants : variants.filter(v => v.key === variant);

  return (
    <div style={{ display: 'flex', gap: 40, flexWrap: 'wrap', justifyContent: 'center', alignItems: 'flex-start' }}>
      {shown.map(v => (
        <div key={v.key} className="variant-wrap">
          <IOSDevice width={320} height={693} dark={false}>{v.el}</IOSDevice>
          <div className="variant-label">{v.label}</div>
        </div>
      ))}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
